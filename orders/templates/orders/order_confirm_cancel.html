{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Cancel Order</title>
    <link rel="stylesheet" href="{% static 'buyers_dashboard/buyersDashboard.css' %}" />
    <style>
      .confirm-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
      .confirm-card { background: white; border-radius: 24px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
      .confirm-icon { width: 72px; height: 72px; background: #fff7ed; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
      .confirm-icon svg { width: 36px; height: 36px; color: #ea580c; }
      .confirm-title { font-size: 24px; font-weight: 700; color: #111; margin: 0 0 8px; }
      .confirm-text { font-size: 15px; color: #666; margin: 0 0 32px; }
      .confirm-order { background: #f9fafb; border-radius: 12px; padding: 16px; margin-bottom: 32px; font-weight: 600; color: #111; }
      .confirm-actions { display: flex; gap: 12px; justify-content: center; }
      .btn-warning { background: #ea580c; color: white; border: none; padding: 14px 28px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; }
      .btn-back { background: transparent; color: #2e7d32; border: 2px solid #2e7d32; padding: 12px 28px; border-radius: 50px; font-size: 15px; font-weight: 600; text-decoration: none; }
      .btn-warning:hover { background: #c2410c; }
      .btn-back:hover { background: #f0fdf4; }
      .confirm-brand { position: fixed; top: 24px; left: 24px; }
      .confirm-brand img { height: 36px; }
    </style>
  </head>
  <body>
    <a class="confirm-brand" href="{% url 'accounts:buyer_dashboard' %}">
      <img src="{% static 'Images/OPS Logo FW.png' %}" alt="OPS" />
    </a>
    <div class="confirm-shell">
      <div class="confirm-card">
        <div class="confirm-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h1 class="confirm-title">Cancel Order #{{ order.id }}?</h1>
        <p class="confirm-text">Cancelling this order will restore the stock. This action cannot be undone.</p>
        <div class="confirm-order">
          GHS {{ order.total_amount }} &bull; {{ order.created_at|date:"d M Y" }}
        </div>
        <div class="confirm-actions">
          <a class="btn-back" href="{% url 'orders:order_detail' order.pk %}">Go Back</a>
          <form method="post" style="display:inline;">
            {% csrf_token %}
            <button class="btn-warning" type="submit">Yes, Cancel Order</button>
          </form>
        </div>
      </div>
    </div>
    <script src="{% static 'media.js' %}"></script>
  </body>
</html>
