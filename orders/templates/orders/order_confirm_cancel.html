<!DOCTYPE html>
<html>
<head><title>Cancel Order</title></head>
<body>
    <h2>Cancel Order #{{ order.id }}?</h2>
    <p>This will restore the stock. Are you sure?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Cancel</button>
    </form>
    <a href="{% url 'orders:order_detail' order.pk %}">Go Back</a>
</body>
</html>
