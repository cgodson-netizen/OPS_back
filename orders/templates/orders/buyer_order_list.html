<!DOCTYPE html>
<html>
<head><title>My Orders</title></head>
<body>
    <nav>
        <strong>OPS</strong> |
        <a href="{% url 'products:product_list' %}">Browse Products</a> |
        <a href="{% url 'orders:cart_detail' %}">My Cart</a> |
        <a href="{% url 'orders:buyer_order_list' %}">My Orders</a> |
        <a href="{% url 'accounts:logout' %}">Logout</a>
    </nav>
    <hr>

    <h2>My Orders</h2>
    {% for order in orders %}
    <div>
        <p>
            Order #{{ order.id }} |
            <strong>{{ order.get_status_display }}</strong> |
            GHS {{ order.total_amount }} |
            {{ order.created_at|date:"d M Y" }}
        </p>
        <a href="{% url 'orders:order_detail' order.pk %}">View Details</a>
    </div>
    <hr>
    {% empty %}
    <p>You have no orders yet. <a href="{% url 'products:product_list' %}">Start shopping</a></p>
    {% endfor %}
</body>
</html>
