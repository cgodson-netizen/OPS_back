<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Final Checkout</title>
    <link rel="stylesheet" href="finalcheckout.css" />
  </head>
  <body>
    <!-- Backend route hooks:
      products:product_list
      orders:cart_detail
      orders:buyer_order_list
      orders:buyer_order_detail
      orders:buyer_order_cancel
      payments:paystack_initialize
      accounts:logout
    -->
    <header class="finalcheckout-topbar">
      <a class="brand-lockup" href="../../buyersDashboard.html" data-route="products:product_list">
        <img class="brand-mark" src="../../../Images/OPS Logo FW.png" alt="OPS" />
      </a>

      <nav class="finalcheckout-nav" aria-label="Buyer navigation">
        <a href="../../buyersDashboard.html" data-route="products:product_list">Browse Products</a>
        <a href="../../My Cart/my_cart.html" data-route="orders:cart_detail">My Cart</a>
        <a href="../../my Orders/my_orders.html" data-route="orders:buyer_order_list">My Orders</a>
        <a href="../../../index.html" data-route="accounts:logout">Logout</a>
      </nav>
    </header>

    <main class="finalcheckout-main">
      <section class="finalcheckout-panel" aria-labelledby="order-title">
        <div class="panel-head">
          <div>
            <p class="page-kicker">Final checkout</p>
            <h1 id="order-title">Order #13</h1>
            <p class="page-intro" id="order-intro">
              Review your order one last time before Paystack opens.
            </p>
          </div>
          <span class="status-pill status-pill--pending" id="order-status">Pending</span>
        </div>

        <div class="meta-grid" aria-label="Order summary">
          <article class="meta-card">
            <span>Delivery address</span>
            <strong id="order-address">cotwi</strong>
          </article>
          <article class="meta-card">
            <span>Total</span>
            <strong id="order-total">GH₵ 7,000.00</strong>
          </article>
          <article class="meta-card">
            <span>Placed</span>
            <strong id="order-placed">06 Jun 2026, 01:22 PM</strong>
          </article>
          <article class="meta-card">
            <span>Items</span>
            <strong id="order-item-count">1 item</strong>
          </article>
        </div>

        <section class="items-card" aria-labelledby="items-title">
          <div class="section-head">
            <div>
              <p class="section-kicker">Items</p>
              <h2 id="items-title">Items in this order</h2>
            </div>
            <span class="count-pill" id="items-count">0 items</span>
          </div>

          <ul class="items-list" id="order-items"></ul>
        </section>

        <div class="action-row">
          <button
            class="action-button action-button-primary"
            id="pay-now-button"
            type="button"
            data-route="payments:paystack_initialize"
          >
            Pay Now — GH₵ 0.00
          </button>
          <button
            class="action-button action-button-secondary"
            id="cancel-order-button"
            type="button"
            data-route="orders:buyer_order_cancel"
          >
            Cancel Order
          </button>
        </div>

        <p class="payment-note" id="payment-note" hidden></p>

        <a class="back-link" href="../../my Orders/my_orders.html" data-route="orders:buyer_order_list">
          ← Back to My Orders
        </a>
      </section>
    </main>

    <script src="../../../media.js"></script>
    <script src="finalcheckout.js"></script>
  </body>
</html>
