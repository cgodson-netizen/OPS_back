<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | My Orders</title>
    <link rel="stylesheet" href="../buyersDashboard.css" />
    <link rel="stylesheet" href="my_orders.css" />
  </head>
  <body>
    <!-- Backend route hooks:
      products:product_list
      orders:cart_detail
      orders:buyer_order_list
      accounts:logout
    -->
    <header class="topbar orders-topbar">
      <a class="brand-lockup" href="../buyersDashboard.html" data-route="products:product_list">
        <img class="brand-mark" src="../../Images/OPS Logo FW.png" alt="OPS" />
      </a>

      <nav class="topnav" aria-label="Buyer dashboard navigation">
        <a class="nav-link" href="../buyersDashboard.html" data-route="products:product_list">
          Browse Products
        </a>
        <a class="nav-link" href="../My Cart/my_cart.html" data-route="orders:cart_detail">
          My Cart
        </a>
        <a class="nav-link is-active" href="./my_orders.html" data-route="orders:buyer_order_list" aria-current="page">
          My Orders
        </a>
      </nav>

      <div class="topbar-actions">
        <a class="button button-secondary" href="../buyersDashboard.html" data-route="products:product_list">
          Continue shopping
        </a>
        <a class="button button-primary" href="../My Cart/my_cart.html" data-route="orders:cart_detail">
          View cart
        </a>

        <a
          class="avatar-chip"
          href="../../index.html"
          data-route="accounts:logout"
          id="logout-avatar"
          aria-label="Logout"
        >
          AM
        </a>
      </div>
    </header>

    <main class="orders-main">
      <section class="panel orders-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">My orders</p>
            <h3>Track your recent purchases</h3>
          </div>
          <span class="status-chip status-chip--neutral" id="orders-count">0 orders</span>
        </div>

        <div class="summary-grid" id="orders-summary"></div>

        <div class="table-wrap">
          <table class="buyer-table orders-table">
            <thead>
              <tr>
                <th scope="col">Order</th>
                <th scope="col">Item</th>
                <th scope="col">Status</th>
                <th scope="col">Total</th>
                <th scope="col">Date</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../../media.js"></script>
    <script src="my_orders.js"></script>
  </body>
</html>
