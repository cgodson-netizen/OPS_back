<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | My Cart</title>
    <link rel="stylesheet" href="../buyersDashboard.css" />
    <link rel="stylesheet" href="my_cart.css" />
  </head>
  <body>
    <!-- Backend route hooks:
      products:product_list
      orders:cart_detail
      orders:cart_update
      orders:cart_remove
      orders:checkout
      orders:buyer_order_list
      accounts:logout
    -->
    <header class="topbar cart-topbar">
      <a class="brand-lockup" href="../buyersDashboard.html" data-route="products:product_list">
        <img class="brand-mark" src="../../Images/OPS Logo FW.png" alt="OPS" />
      </a>

      <nav class="topnav" aria-label="Buyer dashboard navigation">
        <a class="nav-link" href="../buyersDashboard.html" data-route="products:product_list">
          Browse Products
        </a>
        <a class="nav-link is-active" href="./my_cart.html" data-route="orders:cart_detail" aria-current="page">
          My Cart
        </a>
        <a class="nav-link" href="../my Orders/my_orders.html" data-route="orders:buyer_order_list">
          My Orders
        </a>
      </nav>

      <div class="topbar-actions">
        <a class="button button-secondary" href="../buyersDashboard.html" data-route="products:product_list">
          Continue shopping
        </a>
        <a class="button button-primary" href="../checkout/checkout.html" data-route="orders:checkout" id="checkout-link">
          Proceed to checkout
        </a>

        <a
          class="avatar-chip"
          href="../../index.html"
          data-route="accounts:logout"
          id="logout-avatar"
          aria-label="Logout"
        >
          AM
        </a>
      </div>
    </header>

    <main class="cart-main">
      <section class="panel cart-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">My cart</p>
            <h3>Items ready for checkout</h3>
          </div>
          <span class="status-chip status-chip--neutral" id="cart-count">0 items</span>
        </div>

        <div class="summary-grid" id="cart-summary"></div>

        <div class="table-wrap">
          <table class="buyer-table cart-table">
            <thead>
              <tr>
                <th scope="col">Product</th>
                <th scope="col">Qty</th>
                <th scope="col">Price</th>
                <th scope="col">Subtotal</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody id="cart-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../../media.js"></script>
    <script src="my_cart.js"></script>
  </body>
</html>
