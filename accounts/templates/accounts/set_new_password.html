{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Set New Password</title>
    <link rel="stylesheet" href="{% static 'password_reset/passwordReset.css' %}" />
  </head>
  <body>
    <h1 id="LogoText">OPS</h1>
    <main class="reset-shell">
      <section class="reset-card" aria-labelledby="reset-title">
        <h2 id="reset-title">Set New Password</h2>
        <p class="subtitle">Enter your new password below.</p>
        <div class="divider" aria-hidden="true"></div>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <label for="password1">New Password</label>
          <input type="password" id="password1" name="password1" placeholder="Enter new password" required />

          <label for="password2">Confirm New Password</label>
          <input type="password" id="password2" name="password2" placeholder="Repeat new password" required />

          <button type="submit" class="reset-btn">Save New Password</button>
        </form>

        <div class="meta-actions">
          <a class="back-link" href="{% url 'accounts:login' %}">Back to login</a>
        </div>
      </section>
    </main>
    <script src="{% static 'media.js' %}"></script>
  </body>
</html>
