{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Reset Password</title>
    <link rel="stylesheet" href="{% static 'password_reset/passwordReset.css' %}" />
  </head>
  <body>
    <h1 id="LogoText">OPS</h1>
    <main class="reset-shell">
      <section class="reset-card" aria-labelledby="reset-title">
        <div class="reset-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M8.5 10V8a3.5 3.5 0 1 1 7 0v2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
            <rect x="6.5" y="10" width="11" height="9" rx="2.5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        </div>

        <h2 id="reset-title">Reset Password</h2>
        <p class="subtitle">Enter your email address to reset your password.</p>
        <div class="divider" aria-hidden="true"></div>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form id="password-reset-form" method="post" novalidate>
          {% csrf_token %}
          <label for="email">Email Address</label>
          <div class="input-shell" id="input-shell">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation">
                <path d="M4 7.5A1.5 1.5 0 0 1 5.5 6h13A1.5 1.5 0 0 1 20 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 16.5z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.7"/>
                <path d="m5 8 7 5 7-5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7"/>
              </svg>
            </span>
            <input type="email" id="email" name="email" placeholder="hello@ops.com" autocomplete="username" required />
          </div>
          <p class="helper-text">We'll send a verification code if the account exists.</p>
          <p id="identifierError" class="error-message">Please enter a valid email address.</p>
          <button type="submit" class="reset-btn">Reset Password</button>
        </form>

        <div class="meta-actions">
          <a class="back-link" href="{% url 'accounts:login' %}">Back to login</a>
        </div>
      </section>
    </main>
    <script src="{% static 'media.js' %}"></script>
    <script src="{% static 'password_reset/passwordReset.js' %}"></script>
  </body>
</html>
