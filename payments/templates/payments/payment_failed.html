{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPS | Payment Failed</title>
    <link rel="stylesheet" href="{% static 'buyers_dashboard/buyersDashboard.css' %}" />
    <style>
      .failed-shell { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; background: linear-gradient(135deg, #fff5f5 0%, #fee2e2 100%); }
      .failed-card { background: white; border-radius: 24px; padding: 48px 40px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
      .failed-icon { width: 80px; height: 80px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
      .failed-icon svg { width: 40px; height: 40px; color: #dc2626; }
      .failed-title { font-size: 28px; font-weight: 700; color: #111; margin: 0 0 8px; }
      .failed-subtitle { font-size: 16px; color: #666; margin: 0 0 32px; }
      .failed-meta { background: #f9fafb; border-radius: 16px; padding: 24px; margin-bottom: 32px; text-align: left; display: flex; flex-direction: column; gap: 14px; }
      .failed-meta-row { display: flex; justify-content: space-between; align-items: center; }
      .failed-meta-label { font-size: 13px; color: #888; font-weight: 500; }
      .failed-meta-value { font-size: 15px; color: #111; font-weight: 600; }
      .failed-meta-value.red { color: #dc2626; }
      .failed-actions { display: flex; flex-direction: column; gap: 12px; }
      .btn-primary { background: #2e7d32; color: white; border: none; padding: 14px 28px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; text-align: center; }
      .btn-outline { background: transparent; color: #2e7d32; border: 2px solid #2e7d32; padding: 12px 28px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; text-align: center; }
      .btn-danger { background: transparent; color: #dc2626; border: 2px solid #dc2626; padding: 12px 28px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; text-align: center; }
      .btn-primary:hover { background: #1b5e20; }
      .btn-outline:hover { background: #f0fdf4; }
      .btn-danger:hover { background: #fff5f5; }
      .failed-brand { position: fixed; top: 24px; left: 24px; }
      .failed-brand img { height: 36px; }
    </style>
  </head>
  <body>
    <a class="failed-brand" href="{% url 'accounts:buyer_dashboard' %}">
      <img src="{% static 'Images/OPS Logo FW.png' %}" alt="OPS" />
    </a>

    <div class="failed-shell">
      <div class="failed-card">
        <div class="failed-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M15 9l-6 6M9 9l6 6" />
          </svg>
        </div>

        <h1 class="failed-title">Payment Failed</h1>
        <p class="failed-subtitle">Something went wrong. Don't worry — your order is still saved and you can try again.</p>

        <div class="failed-meta">
          <div class="failed-meta-row">
            <span class="failed-meta-label">Order</span>
            <span class="failed-meta-value">#{{ order.id }}</span>
          </div>
          <div class="failed-meta-row">
            <span class="failed-meta-label">Amount</span>
            <span class="failed-meta-value">GHS {{ order.total_amount }}</span>
          </div>
          <div class="failed-meta-row">
            <span class="failed-meta-label">Status</span>
            <span class="failed-meta-value red">Payment Failed</span>
          </div>
        </div>

        <div class="failed-actions">
          <a class="btn-primary" href="{% url 'payments:initiate_payment' order.id %}">Try Again</a>
          <a class="btn-outline" href="{% url 'orders:order_detail' order.pk %}">Back to Order</a>
          <a class="btn-danger" href="{% url 'accounts:buyer_dashboard' %}">Continue Shopping</a>
        </div>
      </div>
    </div>

    <script src="{% static 'media.js' %}"></script>
  </body>
</html>
