<!DOCTYPE html>
<html>
<head><title>{{ product.name }}</title></head>
<body>
    <nav>
        <strong>OPS</strong> |
        <a href="{% url 'products:product_list' %}">Browse Products</a> |
        <a href="{% url 'orders:cart_detail' %}">My Cart</a> |
        <a href="{% url 'orders:buyer_order_list' %}">My Orders</a> |
        <a href="{% url 'accounts:logout' %}">Logout</a>
    </nav>
    <hr>

    <h2>{{ product.name }}</h2>
    {% if product.image %}
    <img src="{{ product.image.url }}" width="200">
    {% endif %}
    <p>{{ product.description }}</p>
    <p>Price: GHS {{ product.price }}</p>
    <p>Stock: {{ product.stock }}</p>
    <p>Category: {{ product.category }}</p>
    <br>
    <a href="{% url 'orders:cart_add' product.id %}">+ Add to Cart</a>
    <br><br>
    <a href="{% url 'products:product_list' %}">← Back to Products</a>
</body>
</html>
