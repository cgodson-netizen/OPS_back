<!DOCTYPE html>
<html>
<head><title>Delete Product</title></head>
<body>
    <h2>Delete "{{ product.name }}"?</h2>
    <p>This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>
    <a href="{% url 'products:seller_product_list' %}">Cancel</a>
</body>
</html>
